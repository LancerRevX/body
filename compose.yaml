services:
  apache:
    build: .
    ports:
      - "${BODY_PORT}:80"
    environment:
      DJANGO_DATABASE_ENGINE: django.db.backends.postgresql
      DJANGO_DATABASE_HOST: db
      DJANGO_DATABASE_NAME: body
      DJANGO_DATABASE_USER: body
      DJANGO_DATABASE_PASSWORD: body
    env_file: .env
  db:
    image: postgres:18.4
    environment:
      POSTGRES_PASSWORD: body
      POSTGRES_USER: body
